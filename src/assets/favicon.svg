<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Rich Metallic Lime & Olive Green Gradients -->
    <linearGradient id="greenMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9f99d" />
      <stop offset="28%" stop-color="#a3e635" />
      <stop offset="65%" stop-color="#65a30d" />
      <stop offset="100%" stop-color="#3f6212" />
    </linearGradient>

    <linearGradient id="greenBright" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4d7c0f" />
      <stop offset="45%" stop-color="#84cc16" />
      <stop offset="85%" stop-color="#bef264" />
      <stop offset="100%" stop-color="#f7fee7" />
    </linearGradient>

    <linearGradient id="greenBlade" x1="0%" y1="50%" x2="100%" y2="30%">
      <stop offset="0%" stop-color="#84cc16" />
      <stop offset="50%" stop-color="#bef264" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>

    <!-- Crisp ambient drop shadow -->
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.85" />
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#84cc16" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Transparent Background - Perfectly Equal S Proportions -->
  <g filter="url(#logoShadow)">
    <!-- Letter S: Exactly Equal & Symmetric Upper Loop (y: 36-96) and Lower Loop (y: 96-156) -->
    <path d="M 96 36 L 46 36 C 26 36 14 48 14 66 C 14 84 26 96 46 96 L 74 96 C 94 96 106 108 106 126 C 106 144 94 156 74 156 L 16 156 L 28 174 L 74 174 C 108 174 126 154 126 126 C 126 98 108 78 74 78 L 46 78 C 34 78 30 74 30 66 C 30 58 34 54 46 54 L 86 54 Z" fill="url(#greenMain)"/>
    
    <!-- Letter A Peak & Right Stance -->
    <path d="M 134 38 L 104 100 L 122 100 L 134 76 L 144 100 L 162 100 Z" fill="url(#greenBright)"/>
    
    <!-- Lower Right Leg of A below the blade cut -->
    <path d="M 148 126 L 168 162 L 188 162 L 162 118 Z" fill="url(#greenMain)"/>
    <path d="M 112 140 L 122 162 L 140 162 L 130 140 Z" fill="url(#greenMain)"/>

    <!-- Signature Dynamic Lime Green & Silver Slash Swoosh / Blade cutting across A -->
    <path d="M 96 150 C 120 134 148 116 186 98 C 158 108 132 124 104 162 Z" fill="url(#greenBlade)"/>
  </g>
</svg>
