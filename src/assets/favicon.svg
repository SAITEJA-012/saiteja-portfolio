<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2c88f" />
      <stop offset="45%" stop-color="#cda660" />
      <stop offset="100%" stop-color="#9d7632" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.65" />
    </filter>
  </defs>
  <!-- Stylized Monogram S and A with transparent background -->
  <g filter="url(#shadow)">
    <!-- S -->
    <path d="M 42 24 C 28 24 18 31 18 41 C 18 52 30 55 40 58 C 47 60 52 63 52 69 C 52 76 45 81 35 81 C 25 81 18 76 15 70" stroke="url(#goldGrad)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- A -->
    <path d="M 48 81 L 68 23 L 88 81" stroke="url(#goldGrad)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 55 62 L 81 62" stroke="url(#goldGrad)" stroke-width="9" stroke-linecap="round"/>
  </g>
</svg>
