<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 180" fill="none">
  <defs>
    <!-- Top Face Satin Metallic Lime Green Gradient -->
    <linearGradient id="faceGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfccb" />
      <stop offset="25%" stop-color="#a3e635" />
      <stop offset="65%" stop-color="#65a30d" />
      <stop offset="100%" stop-color="#4d7c0f" />
    </linearGradient>

    <!-- 3D Extruded Side Wall / Bevel Depth Gradient -->
    <linearGradient id="depthGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3f6212" />
      <stop offset="60%" stop-color="#1a2e05" />
      <stop offset="100%" stop-color="#0d1802" />
    </linearGradient>

    <!-- Specular Highlight Edge -->
    <linearGradient id="edgeGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#65a30d" />
      <stop offset="50%" stop-color="#bef264" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>

    <!-- High-end ambient occlusion drop shadow -->
    <filter id="premiumShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.9" />
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#84cc16" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Transparent Background - Exact 1:1 Silhouette of Uploaded SA Logo with Zero Reshaping -->
  <g filter="url(#premiumShadow)">
    <!-- 1. 3D EXTRUDED SIDE WALLS & DEPTH LAYER -->
    <g transform="translate(2.5, 4.5)" fill="url(#depthGreen)">
      <!-- S Depth (Exact 1:1 uploaded proportions) -->
      <path d="M 112 40 L 46 40 C 22 40 14 54 14 74 L 14 78 C 14 96 24 104 46 104 L 78 104 C 94 104 102 110 102 124 L 102 128 C 102 144 88 154 68 154 L 16 154 L 32 130 L 68 130 C 76 130 80 126 80 122 L 80 120 C 80 114 76 112 68 112 L 44 112 C 22 112 12 102 12 84 L 12 78 C 12 58 24 40 50 40 Z"/>
      <!-- S Exact Outer Silhouette -->
      <path d="M 110 38 L 48 38 C 24 38 12 52 12 74 C 12 94 24 104 48 104 L 76 104 C 92 104 100 110 100 124 C 100 144 86 154 66 154 L 16 154 L 34 128 L 66 128 C 76 128 78 124 78 120 C 78 114 74 112 66 112 L 44 112 C 22 112 12 102 12 84 C 12 62 26 38 52 38 Z"/>
      <!-- A Peak & Right Leg Depth -->
      <path d="M 136 32 L 102 102 L 122 102 L 136 72 L 146 102 L 166 102 Z"/>
      <path d="M 152 128 L 172 168 L 194 168 L 168 116 Z"/>
      <path d="M 114 140 L 126 168 L 146 168 L 134 140 Z"/>
      <!-- Swoosh Blade Depth -->
      <path d="M 98 152 C 124 134 154 114 196 94 C 166 106 136 124 106 166 Z"/>
    </g>

    <!-- 2. FRONT SATIN METALLIC GREEN FACE LAYER -->
    <g fill="url(#faceGreen)">
      <!-- S Face: Exact 1:1 original silhouette -->
      <path d="M 110 38 L 48 38 C 26 38 14 50 14 72 C 14 92 26 102 48 102 L 76 102 C 92 102 100 110 100 126 C 100 144 86 154 66 154 L 16 154 L 34 128 L 66 128 C 76 128 78 124 78 120 C 78 114 74 112 66 112 L 44 112 C 22 112 14 102 14 84 C 14 62 28 38 52 38 Z"/>
      <!-- A Peak & Right Leg Face -->
      <path d="M 136 32 L 102 102 L 122 102 L 136 72 L 146 102 L 166 102 Z"/>
      <path d="M 152 128 L 172 168 L 194 168 L 168 116 Z"/>
      <path d="M 114 140 L 126 168 L 146 168 L 134 140 Z"/>
      <!-- Dynamic Swoosh Blade Face -->
      <path d="M 98 152 C 124 134 154 114 196 94 C 166 106 136 124 106 166 Z" fill="url(#edgeGlow)"/>
    </g>

    <!-- 3. SPECULAR BEVEL EDGE HIGHLIGHTS -->
    <path d="M 110 38 L 48 38 C 26 38 18 42 14 52" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M 136 32 L 146 102" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
